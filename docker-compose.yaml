services:
  postgres:
    image: postgres:15
    container_name: rm_postgres
    restart: always
    env_file: ./api/.env
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rm_redis
    ports:
      - "6379:6379"

  app:
    build: ./api
    container_name: rm_api
    restart: always
    depends_on:
      - postgres
      - redis
    env_file: ./api/.env
    ports:
      - "4000:4000"

volumes:
  postgres_data:
